<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #2c5364;
        }

        .captcha-wrap {
            margin-bottom: 1rem;
        }

        .captcha-card {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 14px;
            background: #fafafa;
        }

        .captcha-label {
            font-size: 0.78rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .captcha-prompt-text {
            font-size: 0.88rem;
            color: #333;
            margin-bottom: 8px;
            min-height: 20px;
        }

        .captcha-prompt-text strong {
            color: #198754;
            font-weight: 600;
        }

        .captcha-img-wrap {
            position: relative;
            width: 100%;
            max-width: 320px;
            height: 160px;
            border-radius: 8px;
            overflow: hidden;
            border: 1.5px solid #ddd;
            cursor: crosshair;
            background: #1a1a22;
        }

        .captcha-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            transition: filter 0.3s;
        }

        .captcha-img-wrap.clicked img {
            filter: brightness(0.5);
        }

        .captcha-skeleton {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #1a1a22 25%, #25252f 50%, #1a1a22 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .captcha-click-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            animation: dotPop 0.2s ease;
        }

        @keyframes dotPop {
            from { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
        }

        .captcha-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            gap: 8px;
        }

        .captcha-status {
            font-size: 0.78rem;
            color: #aaa;
            flex: 1;
        }

        .captcha-status.ok  { color: #198754; font-weight: 500; }
        .captcha-status.err { color: #dc3545; }

        .captcha-refresh-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 6px;
            color: #888;
            font-size: 0.75rem;
            padding: 3px 10px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .captcha-refresh-btn:hover {
            border-color: #198754;
            color: #198754;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #2c5364;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        .login-btn:hover:not(:disabled) { background: #203a43; }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            display: none;
            background: #fdecea;
            color: #c0392b;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 14px;
            text-align: center;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            margin-top: 15px;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Admin Login</h2>

        <div class="error-msg" id="errorMsg"></div>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="usernameInput" placeholder="Enter username" required autocomplete="username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="passwordInput" placeholder="Enter password" required autocomplete="current-password">
        </div>

        <div class="captcha-wrap">
            <div class="captcha-card">
                <div class="captcha-label">&#x1F6E1; Human Verification</div>
                <div class="captcha-prompt-text" id="captchaPrompt">Loading challenge…</div>
                <div class="captcha-img-wrap" id="captchaImgWrap">
                    <div class="captcha-skeleton" id="captchaSkeleton"></div>
                    <img id="captchaImg" src="" alt="CAPTCHA challenge" draggable="false">
                    <div class="captcha-click-dot" id="captchaClickDot"></div>
                </div>
                <div class="captcha-footer">
                    <span class="captcha-status" id="captchaStatus">Click the shape shown above</span>
                    <button type="button" class="captcha-refresh-btn" id="captchaRefreshBtn">&#x21BA; New</button>
                </div>
            </div>
            <input type="hidden" id="captchaToken">
            <input type="hidden" id="captchaX">
            <input type="hidden" id="captchaY">
        </div>

        <button type="button" class="login-btn" id="loginBtn">Login</button>

        <div class="footer-text">Secure Admin Access</div>
    </div>

    <script>
        // ── CAPTCHA MODULE ────────────────────────────────────────────────
        const Captcha = (() => {
            let verified = false;
            const el = id => document.getElementById(id);

            function setStatus(msg, cls = "") {
                const s = el("captchaStatus");
                s.textContent = msg;
                s.className = "captcha-status " + cls;
            }

            async function load() {
                verified = false;
                el("captchaToken").value = "";
                el("captchaX").value = "";
                el("captchaY").value = "";
                el("captchaImg").style.display = "none";
                el("captchaSkeleton").style.display = "block";
                el("captchaImgWrap").classList.remove("clicked");
                el("captchaClickDot").style.display = "none";
                setStatus("Loading challenge…");

                try {
                    const res  = await fetch("/captcha/challenge");
                    const data = await res.json();
                    el("captchaToken").value = data.token;
                    const img = el("captchaImg");
                    img.onload = () => {
                        el("captchaSkeleton").style.display = "none";
                        img.style.display = "block";
                        el("captchaPrompt").innerHTML = data.prompt;
                        setStatus("Click the shape shown above");
                    };
                    img.src = data.image;   // already "data:image/png;base64,..." from server
                } catch (e) {
                    setStatus("Failed to load — click New to retry", "err");
                }
            }

            function handleClick(e) {
                if (verified) return;
                const wrap = el("captchaImgWrap");
                const rect = wrap.getBoundingClientRect();
                const cx   = (e.clientX - rect.left)  * (320 / rect.width);
                const cy   = (e.clientY - rect.top)   * (180 / rect.height);
                const dot  = el("captchaClickDot");
                dot.style.left    = `${e.clientX - rect.left}px`;
                dot.style.top     = `${e.clientY - rect.top}px`;
                dot.style.display = "block";
                wrap.classList.add("clicked");
                verified = true;
                el("captchaX").value = cx;
                el("captchaY").value = cy;
                setStatus("✓ Click recorded — submit when ready", "ok");
            }

            return { load, handleClick, isVerified: () => verified };
        })();

        // ── LOGIN HANDLER ─────────────────────────────────────────────────
        async function handleLogin() {
            const errorMsg = document.getElementById("errorMsg");
            const loginBtn = document.getElementById("loginBtn");

            errorMsg.style.display = "none";

            if (!Captcha.isVerified()) {
                errorMsg.textContent = "Please complete the CAPTCHA first.";
                errorMsg.style.display = "block";
                return;
            }

            const username = document.getElementById("usernameInput").value.trim();
            const password = document.getElementById("passwordInput").value;

            if (!username || !password) {
                errorMsg.textContent = "Please enter username and password.";
                errorMsg.style.display = "block";
                return;
            }

            loginBtn.disabled    = true;
            loginBtn.textContent = "Verifying…";

            const body = new FormData();
            body.append("username",      username);
            body.append("password",      password);
            body.append("captcha_token", document.getElementById("captchaToken").value);
            body.append("captcha_x",     document.getElementById("captchaX").value);
            body.append("captcha_y",     document.getElementById("captchaY").value);

            try {
                const res  = await fetch("/login", { method: "POST", body });
                const data = await res.json();

                if (data.success) {
                    window.location.href = data.redirect || "/admin";
                } else {
                    errorMsg.textContent   = data.error || "Login failed.";
                    errorMsg.style.display = "block";
                    Captcha.load();   // refresh captcha on failure
                }
            } catch (e) {
                errorMsg.textContent   = "Network error. Please try again.";
                errorMsg.style.display = "block";
            } finally {
                loginBtn.disabled    = false;
                loginBtn.textContent = "Login";
            }
        }

        // ── WIRE UP ───────────────────────────────────────────────────────
        document.addEventListener("DOMContentLoaded", () => {
            Captcha.load();

            document.getElementById("captchaImgWrap")
                .addEventListener("click", Captcha.handleClick);
            document.getElementById("captchaRefreshBtn")
                .addEventListener("click", Captcha.load);
            document.getElementById("loginBtn")
                .addEventListener("click", handleLogin);

            // Allow Enter key to submit
            document.addEventListener("keydown", e => {
                if (e.key === "Enter") handleLogin();
            });
        });
    </script>
</body>

</html>
