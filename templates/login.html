<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #2c5364;
        }

        .captcha-box {
            background: #f2f2f2;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 3px;
            border-radius: 6px;
            margin-bottom: 10px;
            user-select: none;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #2c5364;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #203a43;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            font-size: 13px;
            color: #888;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .google-btn:hover {
            background: #f5f5f5;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            margin-top: 15px;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Admin Login</h2>

        <form>
            <div class="input-group">
                <label>Admin ID</label>
                <input type="text" placeholder="Enter Admin ID" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter Password" required>
            </div>

            <div class="input-group">
                <label>Captcha</label>
                <div class="captcha-box">A7K9P2</div>
                <input type="text" placeholder="Enter Captcha" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>


        <div class="footer-text">
            Secure Admin Access
        </div>
    </div>

</body>
</html>
